<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Dynamic Checkbox Timestamp Widget</title>

  <!-- 
    JOTFORM CUSTOM WIDGET SDK  
    This script enables the iframe widget to communicate with Jotform
    (settings, data submission, resizing, field value updates, etc.)
    Official documentation confirms this API for iFrame widgets.
    [1](https://www.youtube.com/watch?v=tsRz21Fy2Fs)
  -->
  <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>

  <style>
    :root {
      --bg: #fff;
      --txt: #111;
      --muted: #666;
      --line: #e6e6e6;
      --brand: #155EEF;
      --ok: #107c41;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--txt);
      font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }

    .wrap {
      padding: 10px 12px;
      padding-bottom: 8px;
    }

    .top {
      margin-bottom: 8px;
    }

    .muted {
      color: var(--muted);
    }

    /* Main table styling */
    .grid {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .grid th,
    .grid td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: middle;
    }

    .grid th {
      background: #fafafa;
      font-weight: 600;
    }

    .grid tr:last-child td {
      border-bottom: none;
    }

    /* Center "Done" checkbox cells without breaking table layout */
    .center {
      text-align: center;
      vertical-align: middle;
    }

    .center input[type="checkbox"] {
      display: inline-block;
      margin: 0 auto;
      vertical-align: middle;
    }

    /* Column widths */
    .grid th:nth-child(1),
    .grid td:nth-child(1) {
      width: 55%;
    }

    .grid th:nth-child(2),
    .grid td:nth-child(2) {
      width: 80px;
      text-align: center;
    }

    .grid th:nth-child(3),
    .grid td:nth-child(3) {
      width: 140px;
    }

    .ts {
      font-family: ui-monospace;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 0;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 10px;
      background: #e9eefc;
      color: #173575;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .ok {
      color: var(--ok);
      font-weight: 600;
    }

    .small {
      font-size: 12px;
    }

    .no-rows {
      padding: 12px 0;
      color: var(--muted);
      display: none;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <!-- Instruction text (set by widget settings) -->
    <div id="instruction" class="top muted"></div>

    <!-- Main table -->
    <table class="grid" id="tbl">
      <thead>
        <tr>
          <th>Label</th>
          <th>Done</th>
          <th>Timestamp (HH:MM:SS)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <!-- Controls -->
    <div class="actions">
      <button id="clearAllTS" class="btn" type="button">Clear All Timestamps</button>
      <span id="status" class="muted small"></span>
    </div>

    <div id="emptyState" class="no-rows">
      No rows configured. Set RowLabels in the widget settings.
    </div>

  </div>


  <script>
    /* -----------------------------------------------
       SETTINGS (read from Jotform widget parameters)
    -------------------------------------------------- */
    const SETTINGS = {
      InstructionText: "",
      RowLabels: "",
      ClearOnUncheck: "true"
    };

    /* -----------------------------------------------
       STATE
    -------------------------------------------------- */
    let rows = [];
    let nextId = 1;

    /* -----------------------------------------------
       UTILITY FUNCTIONS
    -------------------------------------------------- */
    const $ = (id) => document.getElementById(id);

    const pad2 = (n) => (n < 10 ? "0" + n : "" + n);

    /* Format timestamp to HH:MM:SS or return “—” */
    function toHMS(ms) {
      if (!ms) return "—";   // <-- (Your requirement)
      const d = new Date(ms);
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    /* Build the JSON payload for the widget’s main output */
    function toPayload() {
      return rows.map(r => ({
        label: r.label,
        checked: !!r.checked,
        timestamp_iso: r.timestampMs ? new Date(r.timestampMs).toISOString() : "",
        time_hms: toHMS(r.timestampMs)
      }));
    }

    /* Update widget's internal value (for Jotform preview) */
    function syncToForm(live = false) {
      const value = JSON.stringify(toPayload());
      if (live && typeof JFCustomWidget !== "undefined" && JFCustomWidget.setValue) {
        JFCustomWidget.setValue(value);
      }
      return value;
    }

    /* Auto-resize iframe height dynamically */
    function resizeToContent() {
      try {
        if (typeof JFCustomWidget !== "undefined" && JFCustomWidget.requestFrameResize) {
          const body = document.body;
          const html = document.documentElement;
          const contentHeight = Math.max(
            body.scrollHeight, body.offsetHeight,
            html.clientHeight, html.scrollHeight, html.offsetHeight
          );
          JFCustomWidget.requestFrameResize({ height: contentHeight + 2 });
        }
      } catch (e) { }
    }

    /* 
      Push values into hidden Jotform fields.
      Uses Jotform's official widget → form communication API.
      Hidden fields must be named: Row1_Label, Row1_Done, Row1_Time, etc.
    */
    function sendHidden(index, r) {
      const n = index + 1;

      /* Done column output: ✓ or — (as requested) */
      const doneValue = r.checked ? "✓" : "—";

      /* Timestamp output: HH:MM:SS or — (as requested) */
      const timeValue = r.checked ? toHMS(r.timestampMs) : "—";

      JFCustomWidget.sendData({ field: `Row${n}_Label`, value: r.label });
      JFCustomWidget.sendData({ field: `Row${n}_Done`, value: doneValue });
      JFCustomWidget.sendData({ field: `Row${n}_Time`, value: timeValue });
      JFCustomWidget.sendData({ field: "DEBUG_Field", value: "Hello from widget" });
    }

    /* -----------------------------------------------
       RENDERING LOGIC
    -------------------------------------------------- */

    /* Render a single row into the table */
    function renderRow(r, index) {
      const tr = document.createElement("tr");

      /* LABEL cell (not editable by user) */
      const tdLabel = document.createElement("td");
      tdLabel.textContent = r.label;
      tr.appendChild(tdLabel);

      /* DONE cell (checkbox) */
      const tdDone = document.createElement("td");
      tdDone.className = "center";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!r.checked;

      cb.addEventListener("change", () => {
        r.checked = cb.checked;

        /* Assign timestamp or clear it */
        if (cb.checked) {
          if (!r.timestampMs) r.timestampMs = Date.now();
          $("status").innerHTML =
            `<span class="ok">Captured</span> ${toHMS(r.timestampMs)}`;
        } else if (SETTINGS.ClearOnUncheck === "true") {
          r.timestampMs = null;
        }

        /* Update timestamp cell */
        tdTS.textContent = toHMS(r.timestampMs);

        /* Update hidden output + internal JSON */
        syncToForm(true);
        sendHidden(index, r);

        resizeToContent();
      });

      tdDone.appendChild(cb);
      tr.appendChild(tdDone);

      /* TIMESTAMP cell */
      const tdTS = document.createElement("td");
      tdTS.className = "ts";
      tdTS.textContent = toHMS(r.timestampMs);
      tr.appendChild(tdTS);

      $("tbody").appendChild(tr);
    }

    /* Create rows from the RowLabels setting (must be exactly 4) */
    function seedRows() {
      const labels = (SETTINGS.RowLabels || "")
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);

      if (labels.length !== 4) {
        $("emptyState").style.display = "block";
        return;
      }

      $("emptyState").style.display = "none";

      labels.forEach((label, i) => {
        const r = {
          id: nextId++,
          label,
          checked: false,
          timestampMs: null
        };
        rows.push(r);
        renderRow(r, i);
        sendHidden(i, r);  // initial populate for PDF table
      });
    }

    /* -----------------------------------------------
       JOTFORM WIDGET LIFECYCLE
    -------------------------------------------------- */
    if (typeof JFCustomWidget !== "undefined") {

      /* Ready event → initialize widget */
      JFCustomWidget.subscribe("ready", function () {

        /* Load widget settings */
        Object.keys(SETTINGS).forEach(k => {
          const v = JFCustomWidget.getWidgetSetting(k);
          if (v !== undefined && v !== null && v !== "") SETTINGS[k] = String(v);
        });

        $("instruction").textContent = SETTINGS.InstructionText || "";

        /* Attempt to restore from existing submission */
        let restored = false;

        try {
          const existing = JFCustomWidget.getValue();
          const parsed = JSON.parse(existing);

          if (Array.isArray(parsed)) {
            parsed.forEach((p, i) => {
              const r = {
                id: nextId++,
                label: p.label || "",
                checked: !!p.checked,
                timestampMs: p.timestamp_iso ? new Date(p.timestamp_iso).getTime() : null
              };
              rows.push(r);
              renderRow(r, i);
              sendHidden(i, r);
            });
            restored = true;
          }
        } catch (e) {
          console.warn("[widget] restore failed:", e);
        }

        /* If no saved data → seed fresh rows */
        if (!restored) seedRows();

        /* CLEAR ALL TIMESTAMPS button */
        $("clearAllTS").addEventListener("click", () => {

          rows.forEach((r, i) => {
            r.checked = false;
            r.timestampMs = null;
          });

          /* Re-render clean rows */
          $("tbody").innerHTML = "";
          rows.forEach((r, i) => {
            renderRow(r, i);
            sendHidden(i, r);  // update hidden fields as "—"
          });

          syncToForm(true);
          resizeToContent();
        });

        /* Final resizing after initialization */
        resizeToContent();
        setTimeout(resizeToContent, 50);
        setTimeout(resizeToContent, 250);
      });

      /* 
        SUBMIT handler:
        Must send only JSON. Jotform stores this as widget's field value.
      */
      JFCustomWidget.subscribe("submit", function () {
        try {
          const value = JSON.stringify(toPayload());
          JFCustomWidget.sendSubmit({ valid: true, value: value });
        } catch (e) {
          console.error("[widget] submit failed:", e);
          JFCustomWidget.sendSubmit({ valid: true, value: "[]" });
        }
      });
      } else {
        // Local browser testing fallback
        $("instruction").textContent =
          "Local preview: Jotform SDK not detected.";
        $("emptyState").style.display = "block";
      }
  </script>

</body>
</html>
