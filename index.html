<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Jotform Custom Widget SDK -->
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root {
        --bg:#fff; --txt:#111; --muted:#666; --line:#e6e6e6;
        --brand:#155EEF; --success:#107c41; --danger:#b3261e;
      }
      html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font:14px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,Arial}
      .wrap{padding:10px 12px}
      .top{margin-bottom:8px}
      .title{font-weight:600}
      .muted{color:var(--muted)}
      .grid{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:10px;overflow:hidden}
      .grid th,.grid td{border-bottom:1px solid var(--line);padding:8px 10px;vertical-align:middle}
      .grid th{background:#fafafa;text-align:left;font-weight:600}
      .grid tr:last-child td{border-bottom:none}
      input[type="text"]{width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #d0d7de;border-radius:8px}
      input[type="checkbox"]{transform:scale(1.1)}
      .ts{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
      .btn{appearance:none;border:0;border-radius:10px;background:var(--brand);color:#fff;padding:8px 12px;font-weight:600;cursor:pointer}
      .btn.secondary{background:#e9eefc;color:#173575}
      .btn.link{background:transparent;color:var(--brand);padding:0}
      .actions{display:flex;gap:8px;margin-top:10px}
      .ok{color:var(--success);font-weight:600}
      .row-actions{display:flex;gap:6px;align-items:center}
      .small{font-size:12px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="instruction" class="top muted"></div>

      <table class="grid" id="tbl">
        <thead>
          <tr>
            <th style="width:32%;">Label</th>
            <th>Notes</th>
            <th style="width:90px;">Done?</th>
            <th style="width:210px;">Timestamp</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="actions">
        <button id="addRow" class="btn" type="button">+ Add Row</button>
        <button id="clearAllTS" class="btn secondary" type="button">Clear All Timestamps</button>
        <span id="status" class="muted small"></span>
      </div>
    </div>

    <script>
      // ----- Settings pulled from Jotform (configured in Builder) -----
      let SETTINGS = {
        InstructionText: "",
        RowLabels: "",           // comma-separated list
        DefaultRows: "3",        // number as string
        AllowAddRows: "true",
        IncludeUserNotes: "true",
        TimestampFormat: "ISO"   // ISO | Local
      };

      // ----- State -----
      let rows = []; // [{id,label,note,checked,timestamp}]
      let nextId = 1;

      // ----- Utils -----
      const $ = (id) => document.getElementById(id);
      const fmtISO = (ms) => new Date(ms).toISOString();
      const fmtLocal = (ms) => new Date(ms).toLocaleString();
      const fmtTS = (ms) => (ms ? (SETTINGS.TimestampFormat === "Local" ? fmtLocal(ms) : fmtISO(ms)) : "—");

      function toPayload() {
        return rows.map(r => ({
          label: r.label, note: r.note, checked: !!r.checked,
          timestamp: r.timestamp ? new Date(r.timestamp).toISOString() : ""
        }));
      }

      function syncToForm(live=false) {
        const value = JSON.stringify(toPayload());
        if (live) { JFCustomWidget.setValue(value); } // keep builder preview updated
        return value;
      }

      function renderRow(r) {
        const tr = document.createElement("tr");
        tr.dataset.id = r.id;

        // Label (builder can prefill; end‑user can also edit label if you want)
        const tdLabel = document.createElement("td");
        const inpLabel = document.createElement("input");
        inpLabel.type = "text";
        inpLabel.value = r.label || "";
        inpLabel.placeholder = "Label";
        inpLabel.addEventListener("input", () => { r.label = inpLabel.value; syncToForm(true); });
        tdLabel.appendChild(inpLabel);

        // Notes (end‑user)
        const tdNote = document.createElement("td");
        if (SETTINGS.IncludeUserNotes === "true") {
          const inpNote = document.createElement("input");
          inpNote.type = "text";
          inpNote.value = r.note || "";
          inpNote.placeholder = "Notes";
          inpNote.addEventListener("input", () => { r.note = inpNote.value; syncToForm(true); });
          tdNote.appendChild(inpNote);
        } else {
          tdNote.innerHTML = '<span class="muted small">Notes disabled</span>';
        }

        // Checkbox
        const tdDone = document.createElement("td");
        tdDone.style.textAlign = "center";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!r.checked;
        cb.addEventListener("change", () => {
          r.checked = cb.checked;
          if (cb.checked && !r.timestamp) {
            r.timestamp = Date.now(); // freeze on first check
            $("status").innerHTML = `<span class="ok">Captured</span> ${fmtTS(r.timestamp)}`;
          }
          updateTimestampCell();
          syncToForm(true);
        });
        tdDone.appendChild(cb);

        // Timestamp
        const tdTS = document.createElement("td");
        tdTS.className = "ts";
        function updateTimestampCell() {
          tdTS.textContent = fmtTS(r.timestamp);
        }
        updateTimestampCell();

        // Row actions
        const tdAct = document.createElement("td");
        const actions = document.createElement("div");
        actions.className = "row-actions";

        const btnReset = document.createElement("button");
        btnReset.type = "button";
        btnReset.className = "btn link small";
        btnReset.textContent = "Reset";
        btnReset.addEventListener("click", () => {
          r.checked = false;
          r.timestamp = null;
          cb.checked = false;
          updateTimestampCell();
          syncToForm(true);
        });

        const btnDel = document.createElement("button");
        btnDel.type = "button";
        btnDel.className = "btn link small";
        btnDel.textContent = "Remove";
        btnDel.addEventListener("click", () => {
          rows = rows.filter(x => x.id !== r.id);
          tr.remove();
          syncToForm(true);
        });

        actions.appendChild(btnReset);
        actions.appendChild(btnDel);
        tdAct.appendChild(actions);

        tr.appendChild(tdLabel);
        tr.appendChild(tdNote);
        tr.appendChild(tdDone);
        tr.appendChild(tdTS);
        tr.appendChild(tdAct);
        $("tbody").appendChild(tr);
      }

      function addRow(initial = {}) {
        const r = {
          id: nextId++,
          label: initial.label || "",
          note: initial.note || "",
          checked: !!initial.checked,
          timestamp: initial.timestamp ? new Date(initial.timestamp).getTime() : null
        };
        rows.push(r);
        renderRow(r);
        syncToForm(true);
      }

      function seedRows() {
        const labels = (SETTINGS.RowLabels || "").split(",").map(s => s.trim()).filter(Boolean);
        if (labels.length) {
          labels.forEach(l => addRow({ label: l }));
        } else {
          const n = Math.max(0, parseInt(SETTINGS.DefaultRows || "0", 10) || 0);
          for (let i = 0; i < n; i++) addRow({});
        }
      }

      // ----- Jotform widget lifecycle -----
      JFCustomWidget.subscribe("ready", function() {
        // 1) Read settings defined in the Builder
        Object.keys(SETTINGS).forEach(k => {
          const v = JFCustomWidget.getWidgetSetting(k);
          if (typeof v !== "undefined" && v !== null && v !== "") SETTINGS[k] = String(v);
        });

        // 2) Set instruction text
        $("instruction").textContent = SETTINGS.InstructionText || "";

        // 3) Seed rows based on settings or previously saved value
        const existing = JFCustomWidget.getValue && JFCustomWidget.getValue(); // may be undefined
        try {
          const parsed = existing ? JSON.parse(existing) : null;
          if (parsed && Array.isArray(parsed) && parsed.length) {
            parsed.forEach(p => addRow(p));
          } else {
            seedRows();
          }
        } catch {
          seedRows();
        }

        // 4) Controls
        $("addRow").style.display = (SETTINGS.AllowAddRows === "true") ? "inline-block" : "none";
        $("addRow").addEventListener("click", () => addRow({}));

        $("clearAllTS").addEventListener("click", () => {
          rows.forEach(r => { r.checked = false; r.timestamp = null; });
          $("tbody").innerHTML = "";
          rows.forEach(renderRow);
          syncToForm(true);
        });

        // 5) Size the frame
        JFCustomWidget.requestFrameResize({ height: Math.max(220, 160 + rows.length * 48) });
      });

      // Ensure the value is included with the submission
      JFCustomWidget.subscribe("submit", function() {
        const value = syncToForm(false);
        JFCustomWidget.sendSubmit({ valid: true, value });
      });
    </script>
  </body>
</html>
