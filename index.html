<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Click Timestamp Widget (Rows from Settings)</title>

    <!-- Jotform Custom Widget SDK (required for iFrame Widgets) -->
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>

    <style>
      :root {
        --bg: #fff;
        --txt: #111;
        --muted: #666;
        --line: #e6e6e6;
        --brand: #155EEF;
        --ok: #107c41;
      }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--txt);
        font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .wrap { padding: 10px 12px; }
      .top  { margin-bottom: 8px; }
      .muted{ color: var(--muted); }

      .grid {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }
      .grid th, .grid td {
        border-bottom: 1px solid var(--line);
        padding: 8px 10px;
        vertical-align: middle;
      }
      .grid th {
        background: #fafafa;
        text-align: left;
        font-weight: 600;
      }
      .grid tr:last-child td { border-bottom: none; }

      .ts {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .actions { display: flex; gap: 8px; margin-top: 10px; }
      .btn {
        appearance: none; border: 0; border-radius: 10px;
        background: #e9eefc; color: #173575; padding: 8px 12px; font-weight: 600;
        cursor: pointer;
      }
      .ok { color: var(--ok); font-weight: 600; }
      .small { font-size: 12px; }
      .center { text-align: center; }
      .no-rows {
        padding: 12px 0; color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- Optional helper text that you can set from widget settings -->
      <div id="instruction" class="top muted"></div>

      <table class="grid" id="tbl" aria-label="Timestamp checklist">
        <thead>
          <tr>
            <th style="width:45%;">Label</th>
            <th style="width:90px;">Done</th>
            <th style="width:180px;">Timestamp (HH:MM:SS)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="actions">
        <!-- Intentionally NO 'Add Row' button per requirements -->
        <button id="clearAllTS" class="btn" type="button" aria-label="Clear all timestamps">Clear All Timestamps</button>
        <span id="status" class="muted small" role="status" aria-live="polite"></span>
      </div>

      <div id="emptyState" class="no-rows" style="display:none;">
        No rows are configured. Set the <strong>RowLabels</strong> in the widget settings (comma-separated).
      </div>
    </div>

    <script>
      // -----------------------------
      // Settings (configurable in Builder)
      // -----------------------------
      const SETTINGS = {
        InstructionText: "",       // Helper text shown above the table
        RowLabels: "",             // Comma-separated list of labels (required for rows)
        ClearOnUncheck: "true"     // Clear timestamp if a checkbox is unticked
      };

      // -----------------------------
      // Internal state
      // -----------------------------
      let rows = []; // [{id,label,checked,timestampMs}]
      let nextId = 1;

      // -----------------------------
      // Utilities
      // -----------------------------
      const $ = (id) => document.getElementById(id);
      const pad2 = (n) => (n < 10 ? "0" + n : "" + n);
      /**
       * Return local time as HH:MM:SS
       */
      function toHMS(ms) {
        if (!ms) return "—";
        const d = new Date(ms);
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
      }
      function toISO(ms) {
        return ms ? new Date(ms).toISOString() : "";
      }

      /**
       * Build the JSON payload we store in the Jotform submission.
       * Includes both ISO (machine-friendly) and HMS (human-friendly) time.
       */
      function toPayload() {
        return rows.map(r => ({
          label: r.label,
          checked: !!r.checked,
          timestamp_iso: toISO(r.timestampMs),
          time_hms: toHMS(r.timestampMs)
        }));
      }

      /**
       * Push the current value into the form field (for builder/instant preview),
       * and return the serialized string for final submission.
       */
      function syncToForm(live = false) {
        const value = JSON.stringify(toPayload());
        try {
          if (live && typeof JFCustomWidget !== "undefined" && JFCustomWidget.setValue) {
            JFCustomWidget.setValue(value);
          }
        } catch (e) {
          console.warn("[widget] setValue failed:", e);
        }
        return value;
      }

      function autoResize() {
        try {
          if (typeof JFCustomWidget !== "undefined" && JFCustomWidget.requestFrameResize) {
            const height = Math.max(200, 150 + rows.length * 48);
            JFCustomWidget.requestFrameResize({ height });
          }
        } catch (e) {
          // non-fatal
        }
      }

      // -----------------------------
      // Rendering
      // -----------------------------
      function renderRow(r) {
        const tr = document.createElement("tr");
        tr.dataset.id = r.id;

        // Label (NOT editable by respondents)
        const tdLabel = document.createElement("td");
        tdLabel.textContent = r.label || "";
        tdLabel.title = r.label || "";
        tr.appendChild(tdLabel);

        // Done (checkbox)
        const tdDone = document.createElement("td");
        tdDone.className = "center";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!r.checked;
        cb.setAttribute("aria-label", `Mark "${r.label}" as done`);
        cb.addEventListener("change", () => {
          r.checked = cb.checked;

          if (cb.checked) {
            // Freeze timestamp at moment of check if not already set
            if (!r.timestampMs) {
              r.timestampMs = Date.now();
              $("status").innerHTML = `<span class="ok">Captured</span> ${toHMS(r.timestampMs)}`;
            }
          } else if (SETTINGS.ClearOnUncheck === "true") {
            // Clear timestamp on uncheck (misclick protection)
            r.timestampMs = null;
          }

          tdTS.textContent = toHMS(r.timestampMs);
          syncToForm(true);
        });
        tdDone.appendChild(cb);
        tr.appendChild(tdDone);

        // Timestamp (HH:MM:SS)
        const tdTS = document.createElement("td");
        tdTS.className = "ts";
        tdTS.textContent = toHMS(r.timestampMs);
        tr.appendChild(tdTS);

        $("tbody").appendChild(tr);
      }

      function seedRowsFromSettings() {
        const labels = (SETTINGS.RowLabels || "")
          .split(",")
          .map(s => s.trim())
          .filter(Boolean);

        if (!labels.length) {
          // no rows to render
          $("emptyState").style.display = "block";
          return;
        }

        $("emptyState").style.display = "none";

        labels.forEach(label => {
          const r = {
            id: nextId++,
            label,
            checked: false,
            timestampMs: null
          };
          rows.push(r);
          renderRow(r);
        });
      }

      // -----------------------------
      // Jotform lifecycle
      // -----------------------------
      if (typeof JFCustomWidget !== "undefined") {
        // Initialize when the form signals widget is ready
        JFCustomWidget.subscribe("ready", function () {
          try {
            // Read settings (provided via Jotform Builder)
            Object.keys(SETTINGS).forEach(key => {
              try {
                const v = JFCustomWidget.getWidgetSetting(key);
                if (v !== undefined && v !== null && v !== "") SETTINGS[key] = String(v);
              } catch (e) {
                console.warn("[widget] getWidgetSetting error:", key, e);
              }
            });

            // Instruction text
            $("instruction").textContent = SETTINGS.InstructionText || "";

            // Restore previously saved value (edit case) or seed from labels
            let restored = false;
            try {
              const existing = JFCustomWidget.getValue && JFCustomWidget.getValue();
              if (existing) {
                const parsed = JSON.parse(existing);
                if (Array.isArray(parsed) && parsed.length) {
                  parsed.forEach(p => {
                    const r = {
                      id: nextId++,
                      label: p.label || "",
                      checked: !!p.checked,
                      timestampMs: p.timestamp_iso ? new Date(p.timestamp_iso).getTime() : null
                    };
                    rows.push(r);
                    renderRow(r);
                  });
                  restored = true;
                }
              }
            } catch (e) {
              console.warn("[widget] restore parse failed:", e);
            }

            if (!restored) seedRowsFromSettings();

            // “Clear All Timestamps”
            $("clearAllTS").addEventListener("click", () => {
              rows.forEach(r => { r.checked = false; r.timestampMs = null; });
              $("tbody").innerHTML = "";
              rows.forEach(renderRow);
              syncToForm(true);
              autoResize();
            });

            autoResize();
          } catch (e) {
            console.error("[widget] init failed:", e);
          }
        });

        // Ensure the value is included with the submission
        JFCustomWidget.subscribe("submit", function () {
          try {
            const value = syncToForm(false);
            JFCustomWidget.sendSubmit({ valid: true, value });
          } catch (e) {
            console.error("[widget] submit failed:", e);
            // Submit an empty but valid value to avoid blocking submission
            JFCustomWidget.sendSubmit({ valid: true, value: "[]" });
          }
        });
      } else {
        // Local file preview (outside Jotform) to sanity-check UI
        $("instruction").textContent =
          "Local preview: Jotform SDK not detected. Configure RowLabels in Builder to generate rows.";
        $("emptyState").style.display = "block";
      }
    </script>
  </body>
</html>
